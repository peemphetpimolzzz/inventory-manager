name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend unit tests
        run: |
          docker run --rm -v "$PWD:/src" -w /src mcr.microsoft.com/dotnet/sdk:10.0 \
            dotnet test backend/tests/InventoryManager.UnitTests/InventoryManager.UnitTests.csproj -c Release

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Type-check and build the frontend
        run: |
          docker run --rm -v "$PWD/frontend:/app" -w /app node:22-alpine \
            sh -c "npm install && npm run typecheck && npm run build"

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend integration tests
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm integration-tests
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  e2e:
    runs-on: ubuntu-latest
    needs: [unit-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Run end-to-end tests against the full stack
        run: |
          cp .env.example .env
          docker compose up -d --build
          docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
      - name: Tear down
        if: always()
        run: docker compose down -v

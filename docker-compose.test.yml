# Overlay for the test stack. Use together with the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm integration-tests
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm e2e
name: inventory-manager

services:
  # Dedicated SQL Server for integration tests so they never touch the dev database.
  test-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  integration-tests:
    build:
      context: .
      dockerfile: backend/tests/InventoryManager.IntegrationTests/Dockerfile
    environment:
      ConnectionStrings__Default: "Server=test-db;Database=InventoryTest;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
    depends_on:
      test-db:
        condition: service_healthy

  e2e:
    build:
      context: ./e2e
    environment:
      BASE_URL: http://web:80
    depends_on:
      web:
        condition: service_healthy
